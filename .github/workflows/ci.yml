name: Plugin CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build plugins
        run: npm run build

      - name: Typecheck plugins
        run: npm run typecheck

      - name: Lint plugins
        run: npm run lint

      - name: Validate registry
        run: npm run validate

      - name: Test plugins
        run: npm run test

  update-registry:
    name: Update Registry Index
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build plugins
        run: npm run build

      - name: Generate registry.json from manifests
        run: node scripts/generate-registry.js

      - name: Commit built files and registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f plugins/*/server/*.js plugins/*/client/*.js registry.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update built plugins and registry.json"
            git push
          fi
